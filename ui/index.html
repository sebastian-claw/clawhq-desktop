<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CLAWCOM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #eee; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 32px; width: 380px; }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; color: #fff; }
    .sub { font-size: 13px; color: #888; margin-bottom: 24px; }
    label { font-size: 12px; color: #aaa; display: block; margin-bottom: 6px; }
    input { width: 100%; background: #111; border: 1px solid #444; border-radius: 6px; color: #eee; font-size: 14px; padding: 10px 12px; outline: none; }
    input:focus { border-color: #666; }
    .row { display: flex; gap: 8px; margin-top: 16px; }
    button { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-secondary { background: #333; color: #ccc; }
    .btn-secondary:hover { background: #444; }
    .hint { font-size: 11px; color: #555; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card" id="settings" style="display:none">
    <div class="logo">⬡ CLAWCOM</div>
    <div class="sub">Enter your server address to connect</div>
    <label>Server URL</label>
    <input id="url-input" type="text" placeholder="http://100.123.154.91:3001" />
    <div class="row">
      <button class="btn-primary" onclick="save()">Connect</button>
      <button class="btn-secondary" onclick="reset()">Reset</button>
    </div>
    <div class="hint">URL is saved locally on this device</div>
  </div>

  <script>
    const DEFAULT_URL = 'http://100.123.154.91:3001';
    const KEY = 'clawcom_server_url';

    function getUrl() {
      return localStorage.getItem(KEY) || DEFAULT_URL;
    }

    function save() {
      const val = document.getElementById('url-input').value.trim();
      if (!val) return;
      localStorage.setItem(KEY, val);
      window.location = val;
    }

    function reset() {
      localStorage.removeItem(KEY);
      document.getElementById('url-input').value = DEFAULT_URL;
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'r') { e.preventDefault(); window.location.reload(); }
      if (e.key === 'F5') { e.preventDefault(); window.location.reload(); }
      // Cmd+, or Ctrl+, opens settings
      if ((e.metaKey || e.ctrlKey) && e.key === ',') { e.preventDefault(); showSettings(); }
    });

    function showSettings() {
      document.getElementById('url-input').value = getUrl();
      document.getElementById('settings').style.display = 'block';
      document.body.style.alignItems = 'center';
    }

    // On load: if we have a URL saved, go straight there
    // Hold Alt/Option on launch to force settings screen
    const stored = localStorage.getItem(KEY);
    if (stored && !location.search.includes('settings')) {
      window.location = stored;
    } else if (!stored) {
      // First launch — show settings
      showSettings();
    } else {
      window.location = stored;
    }
  </script>
</body>
</html>
